<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spark — КонМари</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1c1c26;
  --surface3:#242432;
  --border:rgba(255,255,255,.09);
  --border2:rgba(255,255,255,.16);
  --text:#ffffff;
  --text2:#b8b8d0;
  --text3:#7070a0;
  --g1:linear-gradient(135deg,#a78bfa,#ec4899);
  --g2:linear-gradient(135deg,#818cf8,#c084fc);
  --g3:linear-gradient(135deg,#34d399,#06b6d4);
  --g4:linear-gradient(135deg,#fb923c,#f43f5e);
  --g5:linear-gradient(135deg,#38bdf8,#818cf8);
  --accent:#a78bfa;
  --accent2:#ec4899;
  --r:16px;
  --r2:12px;
  --font:'Plus Jakarta Sans',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* scrollbar */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px}

/* ── TOPBAR ── */
.topbar{
  height:60px;padding:0 28px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  background:rgba(10,10,15,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:30px;height:30px;border-radius:8px;
  background:var(--g1);
  display:flex;align-items:center;justify-content:center;
  font-size:.85rem;
}
.brand-name{font-family:'Syne',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:-.01em}
.brand-name span{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.82rem}
.bc-item{color:var(--text2);cursor:pointer;transition:.15s;font-weight:400}
.bc-item:hover{color:var(--text)}
.bc-item.active{color:var(--text);font-weight:500;cursor:default}
.bc-sep{color:var(--text3);font-size:.7rem}

.stats-pill{display:flex;gap:4px}
.sp-item{
  padding:5px 11px;border-radius:20px;
  background:var(--surface2);border:1px solid var(--border);
  font-size:.72rem;color:var(--text2);font-weight:400;
  display:flex;align-items:center;gap:5px;
}
.sp-item strong{color:var(--text);font-weight:600;font-size:.8rem}

/* ── SCREENS ── */
.screen{display:none;min-height:calc(100vh - 60px);padding:40px 28px}
.screen.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── HOME ── */
.home-hero{margin-bottom:40px}
.home-hero h2{
  font-family:var(--font);font-size:2.8rem;font-weight:800;
  line-height:1.15;letter-spacing:-.02em;margin-bottom:12px;
  color:#ffffff;
}
.home-hero h2 .grad{background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-hero p{font-size:.9rem;color:var(--text2);letter-spacing:.01em;font-weight:400;line-height:1.5}

.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}

.section-tile{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r);
  padding:26px 22px;
  cursor:pointer;
  transition:transform .2s,border-color .25s,box-shadow .25s;
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:12px;
}
.section-tile::after{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .25s;
  background:radial-gradient(circle at 30% 30%,rgba(167,139,250,.08),transparent 60%);
  pointer-events:none;
}
.section-tile:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 20px 60px rgba(0,0,0,.4)}
.section-tile:hover::after{opacity:1}
.tile-top{display:flex;align-items:flex-start;justify-content:space-between}
.tile-icon-wrap{
  width:52px;height:52px;border-radius:12px;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:1.6rem;
  flex-shrink:0;
}
.tile-actions{display:flex;gap:4px;opacity:0;transition:.2s}
.section-tile:hover .tile-actions{opacity:1}
.ta-btn{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:6px;padding:4px 7px;cursor:pointer;
  font-size:.65rem;color:var(--text3);transition:.15s;line-height:1;
}
.ta-btn:hover{border-color:var(--border2);color:var(--text)}
.tile-name{font-family:var(--font);font-weight:700;font-size:1.15rem;letter-spacing:-.01em;color:#fff}
.tile-meta{font-size:.8rem;color:var(--text2);font-weight:500;margin-top:2px}
.tile-bar{height:3px;background:var(--surface3);border-radius:2px;margin-top:6px}
.tile-bar-fill{height:100%;border-radius:2px;background:var(--g1);transition:width .4s ease;min-width:6px}
.tile-cats{font-size:.8rem;color:var(--text2);line-height:1.6;margin-top:2px}

/* section color variants */
.section-tile:nth-child(1) .tile-bar-fill{background:var(--g1)}
.section-tile:nth-child(2) .tile-bar-fill{background:var(--g2)}
.section-tile:nth-child(3) .tile-bar-fill{background:var(--g3)}
.section-tile:nth-child(4) .tile-bar-fill{background:var(--g4)}
.section-tile:nth-child(5) .tile-bar-fill{background:var(--g5)}
.section-tile:nth-child(1) .tile-icon-wrap{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.2)}
.section-tile:nth-child(2) .tile-icon-wrap{background:rgba(129,140,248,.12);border-color:rgba(129,140,248,.2)}
.section-tile:nth-child(3) .tile-icon-wrap{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.2)}
.section-tile:nth-child(4) .tile-icon-wrap{background:rgba(251,146,60,.12);border-color:rgba(251,146,60,.2)}
.section-tile:nth-child(5) .tile-icon-wrap{background:rgba(56,189,248,.12);border-color:rgba(56,189,248,.2)}

.add-tile{
  border:1.5px dashed var(--border);border-radius:var(--r);
  padding:26px 22px;cursor:pointer;
  transition:.2s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;min-height:160px;background:none;
}
.add-tile:hover{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.04)}
.add-tile-icon{font-size:1.6rem;color:var(--text3);transition:.2s}
.add-tile-text{font-size:.7rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:500;transition:.2s}
.add-tile:hover .add-tile-icon,.add-tile:hover .add-tile-text{color:var(--accent)}

.cats-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:12px;flex-wrap:wrap}
.cats-header h2{font-family:var(--font);font-size:1.8rem;font-weight:800;letter-spacing:-.02em;color:#fff}
.cats-header h2 em{font-style:normal;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.cat-tile{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);padding:20px 18px;
  cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;display:flex;flex-direction:column;gap:8px;
}
.cat-tile:hover{transform:translateY(-2px);border-color:var(--border2);box-shadow:0 12px 40px rgba(0,0,0,.35)}
.ct-icon{font-size:2rem;line-height:1}
.ct-name{font-family:var(--font);font-weight:700;font-size:1rem;letter-spacing:-.01em;color:#fff}
.ct-meta{font-size:.78rem;color:var(--text2);font-weight:500}
.ct-subs{font-size:.78rem;color:var(--text2);line-height:1.5}
.ct-actions{position:absolute;top:10px;right:10px;display:flex;gap:3px;opacity:0;transition:.2s}
.cat-tile:hover .ct-actions{opacity:1}

/* ── ITEMS SCREEN ── */
.items-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;flex-wrap:wrap}
.items-header-left h2{font-family:var(--font);font-size:1.7rem;font-weight:800;letter-spacing:-.02em;color:#fff}
.items-header-left h2 em{font-style:normal;background:var(--g1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.items-header-left p{font-size:.82rem;color:var(--text2);letter-spacing:.01em;margin-top:4px;font-weight:500}
.items-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}

.pill-btn{
  padding:8px 15px;border:1px solid var(--border2);background:var(--surface2);
  cursor:pointer;font-family:var(--font);font-size:.82rem;font-weight:600;
  color:var(--text2);border-radius:20px;transition:.2s;
}
.pill-btn:hover{border-color:var(--border2);color:var(--text)}
.pill-btn.active{background:rgba(167,139,250,.18);border-color:rgba(167,139,250,.5);color:#c4b5fd}

.btn-add-item{
  padding:10px 20px;
  background:var(--g1);
  color:#fff;border:none;cursor:pointer;
  font-family:var(--font);font-size:.88rem;font-weight:700;
  border-radius:20px;transition:.15s;white-space:nowrap;
}
.btn-add-item:hover{opacity:.88;transform:scale(1.02)}

/* Sub-tabs */
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:22px}
.sub-tab{
  padding:5px 13px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;font-size:.78rem;font-weight:400;
  color:var(--text2);border-radius:20px;transition:.2s;
  display:flex;align-items:center;gap:5px;
}
.sub-tab:hover{border-color:var(--border2);color:var(--text)}
.sub-tab.active{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4);color:var(--accent);font-weight:500}
.sub-tab .sc{font-size:.65rem;color:inherit;opacity:.6}
.sub-tab-add{border-style:dashed;color:var(--text3)}
.sub-tab-add:hover{border-color:rgba(167,139,250,.4);color:var(--accent);background:rgba(167,139,250,.05)}

/* ── ITEM CARDS ── */
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:14px}
.item-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r2);overflow:hidden;
  animation:cardIn .25s ease both;
  transition:transform .2s,border-color .2s,box-shadow .2s;
}
.item-card:hover{transform:translateY(-3px);border-color:var(--border2);box-shadow:0 16px 48px rgba(0,0,0,.4)}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card-photo{width:100%;height:160px;object-fit:cover;display:block;cursor:zoom-in}
.card-emoji{
  height:120px;display:flex;align-items:center;justify-content:center;font-size:2.8rem;
  background:var(--surface2);
}
.card-pdf{
  height:110px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  background:var(--surface2);cursor:pointer;transition:.15s;border-bottom:1px solid var(--border);
}
.card-pdf:hover{background:var(--surface3)}
.card-pdf-name{font-size:.62rem;color:var(--text2);text-align:center;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-pdf-hint{font-size:.58rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.card-body{padding:12px 14px 14px}
.card-meta-tag{
  display:inline-block;font-size:.68rem;color:var(--text2);
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;padding:3px 8px;margin-bottom:7px;font-weight:600;
}
.card-name{font-family:var(--font);font-weight:700;font-size:.98rem;line-height:1.3;margin-bottom:5px;color:#fff}
.card-color{font-size:.78rem;color:var(--text2);margin-bottom:5px;font-weight:500}
.card-desc{font-size:.78rem;color:var(--text2);line-height:1.5;margin-bottom:10px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.joy-badge{font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:3px 8px;border-radius:6px}
.j-yes{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.25)}
.j-no{background:rgba(244,63,94,.12);color:#f87171;border:1px solid rgba(244,63,94,.2)}
.j-none{background:var(--surface2);color:var(--text3);border:1px solid var(--border)}
.card-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:.8rem;padding:3px 5px;transition:.2s;line-height:1;border-radius:4px}
.card-del:hover{color:#f87171;background:rgba(244,63,94,.1)}

.empty{grid-column:1/-1;text-align:center;padding:80px 40px;color:var(--text3)}
.empty .ei{font-size:3rem;display:block;margin-bottom:16px}
.empty p{font-size:1rem;color:var(--text2)}
.empty small{font-size:.7rem;margin-top:8px;display:block;letter-spacing:.08em;text-transform:uppercase}

/* ── MODALS ── */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  z-index:400;align-items:center;justify-content:center;
}
.overlay.show{display:flex;animation:ovIn .2s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--surface);
  border:1px solid var(--border2);
  border-radius:var(--r);
  max-width:480px;width:94%;max-height:92vh;overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.6);
  animation:modalIn .25s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
.mhead{padding:24px 24px 20px;border-bottom:1px solid var(--border)}
.mhead h2{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:-.01em}
.mbody{padding:20px 24px}
.mrow{margin-bottom:14px}
.mrow label{
  display:block;font-size:.65rem;font-weight:600;
  letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;
}
.mrow input[type=text],.mrow select,.mrow textarea{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border2);
  padding:10px 12px;
  font-family:'Inter',sans-serif;font-size:.9rem;color:var(--text);
  border-radius:8px;outline:none;transition:.2s;
}
.mrow input[type=text]:focus,.mrow select:focus,.mrow textarea:focus{border-color:rgba(167,139,250,.5);box-shadow:0 0 0 3px rgba(167,139,250,.1)}
.mrow textarea{resize:none;height:70px;font-size:.85rem;color:var(--text2)}
.mrow select{color:var(--text2)}
.mrow input::placeholder,.mrow textarea::placeholder{color:var(--text3)}
.mfoot{padding:0 24px 24px;display:flex;gap:8px}
.btn-cancel{
  flex:1;padding:11px;border:1px solid var(--border);background:var(--surface2);
  cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;color:var(--text2);
  border-radius:8px;transition:.2s;font-weight:500;
}
.btn-cancel:hover{border-color:var(--border2);color:var(--text)}
.btn-save{
  flex:2;padding:11px;background:var(--g1);
  color:#fff;border:none;cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;
  border-radius:8px;transition:.15s;letter-spacing:.02em;
}
.btn-save:hover{opacity:.88}
.btn-danger{
  flex:2;padding:11px;
  background:rgba(244,63,94,.15);color:#f87171;
  border:1px solid rgba(244,63,94,.3);cursor:pointer;
  font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;
  border-radius:8px;transition:.15s;
}
.btn-danger:hover{background:rgba(244,63,94,.25)}

/* Joy buttons */
.joy-row{display:flex;gap:6px}
.jbtn{
  flex:1;padding:9px 4px;
  border:1px solid var(--border2);background:var(--surface2);
  cursor:pointer;font-size:.68rem;font-weight:600;
  letter-spacing:.06em;text-transform:uppercase;color:var(--text2);
  border-radius:8px;transition:.2s;
}
.jbtn:hover{border-color:var(--border2);color:var(--text)}
.jbtn.ay{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.3);color:#34d399}
.jbtn.an{background:rgba(244,63,94,.1);border-color:rgba(244,63,94,.25);color:#f87171}

/* Photo zone */
.pzone{
  border:1.5px dashed var(--border2);border-radius:8px;
  cursor:pointer;transition:.2s;background:var(--surface2);
  position:relative;overflow:hidden;
}
.pzone:hover{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.05)}
.pzone.drag{border-color:var(--accent);background:rgba(167,139,250,.1)}
.pzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;width:100%;height:100%}
.pzph{padding:20px;text-align:center;pointer-events:none}
.pzph span{display:block;font-size:1.4rem;margin-bottom:5px}
.pzph p{font-size:.65rem;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;font-weight:500}
.pzprev{display:none;position:relative}
.pzprev img{width:100%;height:130px;object-fit:cover;display:block}
.pzrm{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;
  width:24px;height:24px;cursor:pointer;font-size:.7rem;
  display:flex;align-items:center;justify-content:center;z-index:3;
  transition:.15s;
}
.pzrm:hover{background:rgba(244,63,94,.8)}

/* Emoji grid */
.egrid{display:flex;flex-wrap:wrap;gap:3px;max-height:120px;overflow-y:auto}
.ep{
  width:33px;height:33px;border:1px solid transparent;
  background:none;cursor:pointer;font-size:1.1rem;
  border-radius:6px;transition:.1s;display:flex;align-items:center;justify-content:center;
}
.ep:hover{background:var(--surface3);border-color:var(--border2)}
.ep.sel{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.4)}

/* Lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:600;align-items:center;justify-content:center;flex-direction:column;gap:14px;backdrop-filter:blur(20px)}
#lb.show{display:flex}
#lb img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:var(--r);box-shadow:0 32px 80px rgba(0,0,0,.8)}
#lb p{color:rgba(255,255,255,.4);font-size:.82rem;letter-spacing:.04em}
#lbx{position:absolute;top:20px;right:24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);font-size:1rem;cursor:pointer;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.15s}
#lbx:hover{background:rgba(255,255,255,.16);color:#fff}


@media(max-width:600px){
  /* Layout */
  .screen{padding:20px 16px}
  .topbar{padding:0 16px;height:56px}
  .stats-pill{display:none}

  /* Hero — fix invisible text */
  .home-hero{margin-bottom:28px}
  .home-hero h2{
    font-size:2.2rem;
    color:#ffffff !important;
    -webkit-text-fill-color:#ffffff !important;
  }
  .home-hero h2 .grad{
    -webkit-text-fill-color:transparent !important;
    background:var(--g1);
    -webkit-background-clip:text;
    background-clip:text;
  }
  .home-hero p{font-size:.88rem;color:#b8b8d0 !important}

  /* Section tiles — single column, bigger text */
  .sections-grid{grid-template-columns:1fr 1fr;gap:12px}
  .section-tile{padding:18px 16px;gap:10px}
  .tile-icon-wrap{width:44px;height:44px;font-size:1.4rem}
  .tile-name{font-size:1.05rem;color:#ffffff !important}
  .tile-meta{font-size:.78rem;color:#b8b8d0 !important}
  .tile-cats{font-size:.76rem;color:#b8b8d0 !important;display:block}

  /* Category tiles */
  .cats-grid{grid-template-columns:1fr 1fr;gap:10px}
  .cat-tile{padding:16px 14px}
  .ct-name{font-size:.95rem;color:#ffffff !important}
  .ct-meta{font-size:.76rem;color:#b8b8d0 !important}
  .ct-subs{font-size:.74rem;color:#b8b8d0 !important}

  /* Items screen header */
  .items-header{flex-direction:column;gap:12px}
  .items-header-left h2{font-size:1.5rem}
  .items-controls{width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .items-controls::-webkit-scrollbar{display:none}
  .pill-btn{font-size:.8rem;padding:8px 14px;white-space:nowrap;flex-shrink:0}
  .btn-add-item{flex-shrink:0}

    items:[]

let D = JSON.parse(localStorage.getItem(SK)||'null') || DEFAULT;
function save(){try{localStorage.setItem(SK,JSON.stringify(D))}catch(e){alert('Мало места — попробуй удалить фото')}}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

let curSection=null, curCat=null, curSub=null;
let joyFilter='all', sortMode='newest';
let curPhoto=null, joyVal=null, delId=null;
let editType=null, editId=null;
let smEmoji='📦', cmEmoji='📦', rnEmoji='📦';
let curFileType=null, curFileName=null;

const EMOJIS=['👗','👚','👔','👖','🧥','🧤','🧣','🧶','👠','👟','🥿','👜','💍','🕶','🧢',
  '💄','🧴','🪥','🌸','💅','🧼','🪞','🪮','📄','📋','📁','🗂','📑','📝','🎓','🔑',
  '🏠','🛋','🛁','🪴','🍳','📚','🎮','🎸','🏋️','⚽','🚗','✈️','💎','🌿','🌙','⭐','🔮','🪬','📦','🪪','💳','🏥'];

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}
function goHome(){
  curSection=null;curCat=null;curSub=null;
  joyFilter='all';sortMode='newest';
  document.querySelectorAll('.pill-btn').forEach(b=>b.classList.remove('active'));
  const ja=document.getElementById('jf-all');if(ja)ja.classList.add('active');
  const sn=document.getElementById('sort-newest');if(sn)sn.classList.add('active');
  renderHome();showScreen('home');
  setBreadcrumb([{label:'Главная',fn:null}]);
}
function openSection(sId){
  curSection=sId;curCat=null;curSub=null;
  const sec=D.sections.find(s=>s.id===sId);
  renderCats();showScreen('cats');
  document.getElementById('cats-title').innerHTML=`${sec.icon} <em>${sec.name}</em>`;
  setBreadcrumb([{label:'Главная',fn:goHome},{label:sec.name,fn:null}]);
}
function openCat(cId){
  curCat=cId;curSub=null;
  const cat=D.cats.find(c=>c.id===cId);
  const sec=D.sections.find(s=>s.id===cat.sId);
  renderItems();showScreen('items');
  document.getElementById('items-title').innerHTML=`${cat.icon} <em>${cat.name}</em>`;
  document.getElementById('items-subtitle').textContent=sec?sec.name:'';
  setBreadcrumb([
    {label:'Главная',fn:goHome},
    {label:sec?.name||'',fn:()=>openSection(sec.id)},
    {label:cat.name,fn:null}
  ]);
}
function setBreadcrumb(items){
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML=items.map((it,i)=>{
    const isLast=i===items.length-1;
    const cls='bc-item'+(isLast?' active':'');
    const onclick=it.fn?`onclick="(${it.fn.toString()})()"` : '';
    return (i>0?'<span class="bc-sep">›</span>':'')+`<span class="${cls}" ${onclick}>${it.label}</span>`;
  }).join('');
}

function updateStats(){
  document.getElementById('st-total').textContent=D.items.length;
  document.getElementById('st-joy').textContent=D.items.filter(i=>i.joy==='yes').length;
  document.getElementById('st-out').textContent=D.items.filter(i=>i.joy==='no').length;
}

function renderHome(){
  updateStats();
  const grid=document.getElementById('sections-grid');
  grid.innerHTML=D.sections.map(sec=>{
    const cats=D.cats.filter(c=>c.sId===sec.id);
    const cnt=D.items.filter(i=>i.sId===sec.id).length;
    const total=D.items.length||1;
    const pct=Math.max(4,Math.round(cnt/total*100));
    const catNames=cats.slice(0,3).map(c=>c.name).join(', ')+(cats.length>3?'…':'');
    return `<div class="section-tile" onclick="openSection('${sec.id}')">
      <div class="tile-top">
        <div class="tile-icon-wrap">${sec.icon}</div>
        <div class="tile-actions" onclick="event.stopPropagation()">
          <button class="ta-btn" onclick="openRename('section','${sec.id}')">✏</button>
          <button class="ta-btn" onclick="deleteSection('${sec.id}')">✕</button>
        </div>
      </div>
      <div class="tile-name">${sec.name}</div>
      <div class="tile-meta">${cnt} вещей · ${cats.length} категорий</div>
      <div class="tile-bar"><div class="tile-bar-fill" style="width:${pct}%"></div></div>
      ${catNames?`<div class="tile-cats">${catNames}</div>`:''}
    </div>`;
  }).join('')+`<div class="add-tile" onclick="openSectionModal()">
    <div class="add-tile-icon">＋</div>
    <div class="add-tile-text">Новый раздел</div>
  </div>`;
}

function renderCats(){
  updateStats();
  const cats=D.cats.filter(c=>c.sId===curSection);
  const grid=document.getElementById('cats-grid');
  grid.innerHTML=cats.map(cat=>{
    const subs=D.subs.filter(s=>s.cId===cat.id);
    const cnt=D.items.filter(i=>i.cId===cat.id).length;
    const subNames=subs.slice(0,3).map(s=>s.name).join(', ')+(subs.length>3?'…':'');
    return `<div class="cat-tile" onclick="openCat('${cat.id}')">
      <div class="ct-actions" onclick="event.stopPropagation()">
        <button class="ta-btn" onclick="openRename('cat','${cat.id}')">✏</button>
        <button class="ta-btn" onclick="deleteCat('${cat.id}')">✕</button>
      </div>
      <div class="ct-icon">${cat.icon}</div>
      <div class="ct-name">${cat.name}</div>
      <div class="ct-meta">${cnt} вещей</div>
      ${subNames?`<div class="ct-subs">${subNames}</div>`:''}
    </div>`;
  }).join('')+`<div class="cat-tile" style="border:1.5px dashed rgba(255,255,255,.07);justify-content:center;align-items:center;gap:8px;cursor:pointer;min-height:130px" onclick="openCatModal()">
    <div style="font-size:1.4rem;color:var(--text3)">＋</div>
    <div style="font-size:.65rem;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;font-weight:500">Новая категория</div>
  </div>`;
}

function renderItems(){
  updateStats();
  const cat=D.cats.find(c=>c.id===curCat);
  const subs=D.subs.filter(s=>s.cId===curCat);
  const tabsEl=document.getElementById('sub-tabs');
  tabsEl.innerHTML=`<button class="sub-tab${curSub===null?' active':''}" onclick="setSub(null)">
    Все <span class="sc">${D.items.filter(i=>i.cId===curCat).length}</span>
  </button>`+
  subs.map(s=>{
    const cnt=D.items.filter(i=>i.subId===s.id).length;
    return `<button class="sub-tab${curSub===s.id?' active':''}" onclick="setSub('${s.id}')">
      ${s.name} <span class="sc">${cnt}</span>
      <span onclick="event.stopPropagation();deleteSub('${s.id}')" style="color:var(--text3);margin-left:2px;font-size:.6rem">✕</span>
    </button>`;
  }).join('')+
  `<button class="sub-tab sub-tab-add" onclick="openSubModal()">+ подкатегория</button>`;

  let items=D.items.filter(i=>i.cId===curCat);
  if(curSub) items=items.filter(i=>i.subId===curSub);
  if(joyFilter!=='all') items=items.filter(i=>i.joy===joyFilter);
  if(sortMode==='name') items.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  else if(sortMode==='joy'){const o={yes:0,maybe:1,no:2};items.sort((a,b)=>(o[a.joy]??3)-(o[b.joy]??3));}

  const grid=document.getElementById('items-grid');
  if(!items.length){
    grid.innerHTML=`<div class="empty"><span class="ei">✦</span><p>Здесь пока пусто</p><small>Нажми «+ Добавить» чтобы начать</small></div>`;
    return;
  }
  grid.innerHTML=items.map(item=>{
    const jc=item.joy==='yes'?'j-yes':item.joy==='no'?'j-no':'j-none';
    const jt=item.joy==='yes'?'✨ Радость':item.joy==='no'?'🗑 Убрать':'· · ·';
    const sn=(item.name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const subName=item.subId?D.subs.find(s=>s.id===item.subId)?.name:'';
    let topEl;
    if(item.fileType==='pdf'&&item.photo){
      topEl=`<div class="card-pdf" onclick="openPDF('${item.id}')">
        <span style="font-size:2rem">📄</span>
        <div class="card-pdf-name">${item.fileName||'документ.pdf'}</div>
        <div class="card-pdf-hint">открыть</div>
      </div>`;
    } else if(item.photo){
      topEl=`<img class="card-photo" src="${item.photo}" alt="${item.name}" onclick="lbOpen('${item.id}')">`;
    } else {
      topEl=`<div class="card-emoji">${cat?.icon||'✦'}</div>`;
    }
    return `<div class="item-card">
      ${topEl}
      <div class="card-body">
        ${subName?`<span class="card-meta-tag">${subName}</span>`:''}
        <div class="card-name">${item.name}</div>
        ${item.color?`<div class="card-color">${item.color}</div>`:''}
        ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
        <div class="card-footer">
          <span class="joy-badge ${jc}">${jt}</span>
          <button class="card-del" onclick="askDel('${item.id}','${sn}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setSub(id){curSub=id;renderItems();}
function setJoyFilter(f){
  joyFilter=f;
  document.querySelectorAll('#screen-items .pill-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('jf-'+f).classList.add('active');
  renderItems();
}
function setSort(s){
  sortMode=s;
  ['newest','name'].forEach(x=>{const el=document.getElementById('sort-'+x);if(el)el.classList.remove('active');});
  document.getElementById('sort-'+s).classList.add('active');
  renderItems();
}

function renderEgrid(elId,sel,setter){
  document.getElementById(elId).innerHTML=EMOJIS.map(e=>
    `<button class="ep${e===sel?' sel':''}" onclick="${setter}('${e}');renderEgrid('${elId}','${e}',${setter.toString()})">${e}</button>`
  ).join('');
}

function openSectionModal(editSId){
  editType=editSId?'section':null;editId=editSId||null;
  const sec=editSId?D.sections.find(s=>s.id===editSId):null;
  smEmoji=sec?.icon||'📦';
  document.getElementById('sm-h').textContent=editSId?'Изменить раздел':'Новый раздел';
  document.getElementById('sm-name').value=sec?.name||'';
  renderEgrid('sm-egrid',smEmoji,e=>smEmoji=e);
  openOv('ov-section');setTimeout(()=>document.getElementById('sm-name').focus(),50);
}
function saveSection(){
  const name=document.getElementById('sm-name').value.trim();if(!name)return;
  if(editId){const s=D.sections.find(x=>x.id===editId);if(s){s.name=name;s.icon=smEmoji;}}
  else D.sections.push({id:uid(),name,icon:smEmoji});
  save();closeOv('ov-section');renderHome();
}

function openCatModal(editCId){
  editType=editCId?'cat':null;editId=editCId||null;
  const cat=editCId?D.cats.find(c=>c.id===editCId):null;
  cmEmoji=cat?.icon||'📁';
  document.getElementById('cm-h').textContent=editCId?'Изменить категорию':'Новая категория';
  document.getElementById('cm-name').value=cat?.name||'';
  renderEgrid('cm-egrid',cmEmoji,e=>cmEmoji=e);
  openOv('ov-cat');setTimeout(()=>document.getElementById('cm-name').focus(),50);
}
function saveCat(){
  const name=document.getElementById('cm-name').value.trim();if(!name)return;
  if(editId){const c=D.cats.find(x=>x.id===editId);if(c){c.name=name;c.icon=cmEmoji;}}
  else D.cats.push({id:uid(),sId:curSection,name,icon:cmEmoji});
  save();closeOv('ov-cat');renderCats();
}

function openSubModal(){document.getElementById('sbm-name').value='';openOv('ov-sub');setTimeout(()=>document.getElementById('sbm-name').focus(),50);}
function saveSub(){
  const name=document.getElementById('sbm-name').value.trim();if(!name||!curCat)return;
  D.subs.push({id:uid(),cId:curCat,name});save();closeOv('ov-sub');renderItems();
}

function openItemModal(){
  joyVal=null;curPhoto=null;curFileType=null;curFileName=null;
  document.getElementById('im-name').value='';
  document.getElementById('im-color').value='';
  document.getElementById('im-desc').value='';
  document.querySelectorAll('.jbtn').forEach(b=>b.className='jbtn');
  document.getElementById('pz-input').value='';
  document.getElementById('pzph').style.display='block';
  document.getElementById('pzprev').style.display='none';
  document.getElementById('pzimg').style.display='none';
  document.getElementById('pzpdf').style.display='none';
  const subs=D.subs.filter(s=>s.cId===curCat);
  document.getElementById('im-sub').innerHTML='<option value="">— без подкатегории —</option>'+
    subs.map(s=>`<option value="${s.id}"${curSub===s.id?' selected':''}>${s.name}</option>`).join('');
  openOv('ov-item');setTimeout(()=>document.getElementById('im-name').focus(),50);
}
function setJoy(v){
  joyVal=v;document.querySelectorAll('.jbtn').forEach(b=>b.className='jbtn');
  if(v==='yes')document.getElementById('jb-yes').className='jbtn ay';
  if(v==='no')document.getElementById('jb-no').className='jbtn an';
}
function saveItem(){
  const name=document.getElementById('im-name').value.trim();
  if(!name){document.getElementById('im-name').focus();return;}
  const item={
    id:uid(),name,sId:curSection,cId:curCat,
    subId:document.getElementById('im-sub').value||null,
    color:document.getElementById('im-color').value.trim(),
    desc:document.getElementById('im-desc').value.trim(),
    joy:joyVal,photo:curPhoto,fileType:curFileType||null,fileName:curFileName||null,
    date:new Date().toISOString()
  };
  D.items.unshift(item);
  try{save();}catch(e){item.photo=null;item.fileType=null;D.items[0]=item;save();alert('Файл не сохранён — мало места.');}
  closeOv('ov-item');renderItems();
}

function pzDrag(e,on){e.preventDefault();document.getElementById('pz').classList.toggle('drag',on);}
function pzDrop(e){
  e.preventDefault();document.getElementById('pz').classList.remove('drag');
  const f=e.dataTransfer.files[0];if(!f)return;
  if(f.type==='application/pdf')loadPDF(f);else if(f.type.startsWith('image/'))loadPhoto(f);
}
function pzSelect(e){const f=e.target.files[0];if(!f)return;if(f.type==='application/pdf')loadPDF(f);else if(f.type.startsWith('image/'))loadPhoto(f);}
function loadPhoto(file){
  curFileType='image';curFileName=file.name;
  const r=new FileReader();
  r.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const c=document.createElement('canvas'),M=900;
      let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      curPhoto=c.toDataURL('image/jpeg',.78);
      document.getElementById('pzph').style.display='none';
      document.getElementById('pzprev').style.display='block';
      document.getElementById('pzimg').style.display='block';
      document.getElementById('pzimg').src=curPhoto;
      document.getElementById('pzpdf').style.display='none';
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function loadPDF(file){
  curFileType='pdf';curFileName=file.name;
  const r=new FileReader();
  r.onload=function(e){
    curPhoto=e.target.result;
    document.getElementById('pzph').style.display='none';
    document.getElementById('pzprev').style.display='block';
    document.getElementById('pzimg').style.display='none';
    const pdfEl=document.getElementById('pzpdf');
    pdfEl.style.display='flex';
    document.getElementById('pzpdf-name').textContent=file.name;
  };
  r.readAsDataURL(file);
}
function pzRm(e){
  e.stopPropagation();curPhoto=null;curFileType=null;curFileName=null;
  document.getElementById('pz-input').value='';
  document.getElementById('pzph').style.display='block';
  document.getElementById('pzprev').style.display='none';
  document.getElementById('pzimg').style.display='none';
  document.getElementById('pzpdf').style.display='none';
}

function askDel(id,name){delId=id;document.getElementById('del-text').textContent=`"${name}" — поблагодари эту вещь за службу и отпусти с благодарностью.`;openOv('ov-del');}
function confirmDel(){if(delId){D.items=D.items.filter(i=>i.id!==delId);save();renderItems();}closeOv('ov-del');delId=null;}
function deleteSection(id){
  if(!confirm('Удалить раздел? Все категории и вещи будут удалены.'))return;
  const catIds=D.cats.filter(c=>c.sId===id).map(c=>c.id);
  D.subs=D.subs.filter(s=>!catIds.includes(s.cId));
  D.items=D.items.filter(i=>i.sId!==id);
  D.cats=D.cats.filter(c=>c.sId!==id);
  D.sections=D.sections.filter(s=>s.id!==id);
  save();renderHome();
}
function deleteCat(id){
  if(!confirm('Удалить категорию? Все вещи будут удалены.'))return;
  D.subs=D.subs.filter(s=>s.cId!==id);
  D.items=D.items.filter(i=>i.cId!==id);
  D.cats=D.cats.filter(c=>c.id!==id);
  save();renderCats();
}
function deleteSub(id){
  if(!confirm('Удалить подкатегорию?'))return;
  D.items.forEach(i=>{if(i.subId===id)i.subId=null;});
  D.subs=D.subs.filter(s=>s.id!==id);
  if(curSub===id)curSub=null;
  save();renderItems();
}

let rnType=null,rnId=null;
function openRename(type,id){
  rnType=type;rnId=id;
  const titles={section:'Изменить раздел',cat:'Изменить категорию'};
  document.getElementById('rn-h').textContent=titles[type]||'Переименовать';
  const wrap=document.getElementById('rn-emoji-wrap');
  if(type==='section'){const s=D.sections.find(x=>x.id===id);document.getElementById('rn-name').value=s?.name||'';rnEmoji=s?.icon||'📦';wrap.style.display='block';renderEgrid('rn-egrid',rnEmoji,e=>rnEmoji=e);}
  else if(type==='cat'){const c=D.cats.find(x=>x.id===id);document.getElementById('rn-name').value=c?.name||'';rnEmoji=c?.icon||'📁';wrap.style.display='block';renderEgrid('rn-egrid',rnEmoji,e=>rnEmoji=e);}
  openOv('ov-rename');setTimeout(()=>document.getElementById('rn-name').focus(),50);
}
function confirmRename(){
  const name=document.getElementById('rn-name').value.trim();if(!name)return;
  if(rnType==='section'){const s=D.sections.find(x=>x.id===rnId);if(s){s.name=name;s.icon=rnEmoji;}}
  else if(rnType==='cat'){const c=D.cats.find(x=>x.id===rnId);if(c){c.name=name;c.icon=rnEmoji;}}
  save();closeOv('ov-rename');
  if(rnType==='section')renderHome();else renderCats();
}

function openOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.overlay').forEach(o=>{o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.querySelectorAll('.overlay.show').forEach(o=>o.classList.remove('show'));});

function lbOpen(id){const item=D.items.find(i=>i.id===id);if(!item?.photo||item.fileType==='pdf')return;document.getElementById('lbimg').src=item.photo;document.getElementById('lbcap').textContent=item.name;document.getElementById('lb').classList.add('show');}
function lbClose(){document.getElementById('lb').classList.remove('show');}
function openPDF(id){
  const item=D.items.find(i=>i.id===id);if(!item?.photo)return;
  const win=window.open();
  win.document.write(`<html><head><title>${item.name}</title></head><body style="margin:0"><embed src="${item.photo}" type="application/pdf" width="100%" height="100%" style="position:fixed;inset:0"></body></html>`);
}

renderHome();
</script>
