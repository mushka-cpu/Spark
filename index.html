<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>КонМари</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#f5f0e8; --warm:#faf8f4; --sage:#8a9e8b; --sage-l:#c5d4c6;
  --sage-d:#5a7a5c; --blush:#d4a89a; --blush-l:#edddd8;
  --char:#2c2c2c; --mid:#6b6b6b; --light:#a8a8a8; --border:#e0d8cc; --r:4px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Cormorant Garamond',serif;background:var(--cream);color:var(--char);min-height:100vh}

/* ── HEADER ── */
.topbar{background:var(--warm);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.breadcrumb{display:flex;align-items:center;gap:8px;font-size:1.05rem;font-weight:300}
.bc-item{color:var(--mid);cursor:pointer;transition:.15s}
.bc-item:hover{color:var(--sage-d)}
.bc-item.active{color:var(--char);font-weight:600;cursor:default}
.bc-sep{color:var(--border);font-size:0.8rem}
.topbar-right{display:flex;align-items:center;gap:10px}
.stats-pill{display:flex;gap:16px}
.sp{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--light);letter-spacing:.1em;text-transform:uppercase}
.sp strong{color:var(--sage-d);font-weight:400;font-size:0.85rem;font-family:'Cormorant Garamond',serif;display:block;line-height:1}

/* ── SCREENS ── */
.screen{display:none;min-height:calc(100vh - 64px);padding:40px 36px}
.screen.active{display:block}

/* ── HOME SCREEN ── */
.home-greeting{margin-bottom:36px}
.home-greeting h2{font-size:2.4rem;font-weight:300;letter-spacing:.02em}
.home-greeting h2 em{font-style:italic;color:var(--sage-d)}
.home-greeting p{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--light);letter-spacing:.15em;text-transform:uppercase;margin-top:6px}

.sections-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.section-tile{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:28px 24px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:10px}
.section-tile::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--sage-l);transition:.2s}
.section-tile:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.09);border-color:var(--sage)}
.section-tile:hover::before{background:var(--sage-d)}
.tile-icon{font-size:2.8rem;line-height:1}
.tile-name{font-size:1.3rem;font-weight:600;color:var(--char)}
.tile-meta{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--light);letter-spacing:.1em;text-transform:uppercase}
.tile-cats{font-size:.85rem;color:var(--mid);font-style:italic;margin-top:2px}
.tile-actions{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:.2s}
.section-tile:hover .tile-actions{opacity:1}
.ta-btn{background:var(--cream);border:1px solid var(--border);border-radius:3px;padding:3px 6px;cursor:pointer;font-size:.65rem;color:var(--mid);transition:.15s;line-height:1}
.ta-btn:hover{border-color:var(--sage);color:var(--sage-d)}

.add-tile{border:2px dashed var(--border);border-radius:8px;padding:28px 24px;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:140px;background:none}
.add-tile:hover{border-color:var(--sage);background:var(--sage-l)}
.add-tile-icon{font-size:1.8rem;color:var(--light)}
.add-tile-text{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--light);letter-spacing:.12em;text-transform:uppercase}
.add-tile:hover .add-tile-icon,.add-tile:hover .add-tile-text{color:var(--sage-d)}

/* ── CATEGORIES SCREEN ── */
.cats-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}
.cats-header h2{font-size:1.9rem;font-weight:300}
.cats-header h2 em{font-style:italic;color:var(--sage-d)}
.cats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.cat-tile{background:var(--warm);border:1px solid var(--border);border-radius:8px;padding:22px 20px;cursor:pointer;transition:transform .2s,box-shadow .2s,border-color .2s;position:relative;display:flex;flex-direction:column;gap:8px}
.cat-tile:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.08);border-color:var(--sage)}
.ct-icon{font-size:2rem;line-height:1}
.ct-name{font-size:1.1rem;font-weight:600;color:var(--char)}
.ct-meta{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--light);letter-spacing:.1em;text-transform:uppercase}
.ct-subs{font-size:.8rem;color:var(--mid);font-style:italic}
.ct-actions{position:absolute;top:8px;right:8px;display:flex;gap:3px;opacity:0;transition:.2s}
.cat-tile:hover .ct-actions{opacity:1}

/* ── ITEMS SCREEN ── */
.items-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.items-header-left h2{font-size:1.7rem;font-weight:300}
.items-header-left h2 em{font-style:italic;color:var(--sage-d)}
.items-header-left p{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--light);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
.items-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sort-btn{padding:6px 13px;border:1px solid var(--border);background:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase;color:var(--light);border-radius:var(--r);transition:.2s}
.sort-btn.active,.sort-btn:hover{border-color:var(--sage);color:var(--sage-d)}
.sort-btn.active{background:var(--sage-l)}
.joy-filter{display:flex;gap:4px}
.jf-btn{padding:5px 11px;border:1px solid var(--border);background:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:.57rem;text-transform:uppercase;letter-spacing:.08em;color:var(--light);border-radius:var(--r);transition:.2s}
.jf-btn.active,.jf-btn:hover{border-color:var(--sage);color:var(--sage-d)}
.jf-btn.active{background:var(--sage-l)}
.btn-add-item{padding:9px 18px;background:var(--sage-d);color:var(--cream);border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;border-radius:var(--r);transition:.2s;white-space:nowrap}
.btn-add-item:hover{background:var(--sage)}

/* Sub-tabs */
.sub-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:20px}
.sub-tab{padding:6px 14px;border:1px solid var(--border);background:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:.9rem;font-style:italic;color:var(--mid);border-radius:20px;transition:.2s;display:flex;align-items:center;gap:5px}
.sub-tab:hover{border-color:var(--sage);color:var(--sage-d)}
.sub-tab.active{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d);font-weight:600}
.sub-tab .sc{font-family:'DM Mono',monospace;font-size:.55rem;color:inherit;opacity:.7}
.sub-tab-add{border-style:dashed;color:var(--light)}
.sub-tab-add:hover{color:var(--sage-d);border-color:var(--sage);background:var(--sage-l)}

.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}
.item-card{background:var(--warm);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;animation:fadeUp .25s ease;transition:transform .2s,box-shadow .2s}
.item-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.07)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-photo{width:100%;height:160px;object-fit:cover;display:block;cursor:zoom-in}
.card-emoji{height:110px;display:flex;align-items:center;justify-content:center;font-size:2.6rem;background:var(--cream)}
.card-body{padding:11px 13px 13px}
.card-name{font-size:.95rem;font-weight:600;line-height:1.2;margin-bottom:3px}
.card-meta{font-family:'DM Mono',monospace;font-size:.55rem;color:var(--light);letter-spacing:.07em;margin-bottom:5px}
.card-desc{font-size:.78rem;color:var(--mid);font-style:italic;line-height:1.4;margin-bottom:8px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.joy-badge{font-family:'DM Mono',monospace;font-size:.53rem;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:2px}
.j-yes{background:var(--sage-l);color:var(--sage-d)}
.j-no{background:var(--blush-l);color:#8b5a52}
.j-none{background:var(--border);color:var(--light)}
.card-pdf{height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:var(--cream);cursor:pointer;transition:.15s;border-bottom:1px solid var(--border)}
.card-pdf:hover{background:var(--blush-l)}
.card-pdf-name{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--mid);text-align:center;letter-spacing:.05em;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-pdf-hint{font-family:'DM Mono',monospace;font-size:.52rem;color:var(--light);letter-spacing:.1em;text-transform:uppercase}
.card-del{background:none;border:none;cursor:pointer;color:var(--border);font-size:.85rem;padding:2px 4px;transition:.2s;line-height:1}
.card-del:hover{color:#c0392b}

.empty{grid-column:1/-1;text-align:center;padding:80px 40px;color:var(--light)}
.empty .ei{font-size:3rem;display:block;margin-bottom:14px}
.empty p{font-style:italic;font-size:1.1rem}
.empty small{font-family:'DM Mono',monospace;font-size:.6rem;margin-top:8px;display:block;letter-spacing:.1em}

/* ── MODALS ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(44,44,44,.55);z-index:400;align-items:center;justify-content:center}
.overlay.show{display:flex}
.modal{background:var(--warm);border:1px solid var(--border);border-radius:var(--r);max-width:480px;width:94%;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.mhead{padding:24px 28px 20px;border-bottom:1px solid var(--border)}
.mhead h2{font-size:1.4rem;font-weight:300;font-style:italic}
.mbody{padding:20px 28px}
.mrow{margin-bottom:14px}
.mrow label{display:block;font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.14em;text-transform:uppercase;color:var(--light);margin-bottom:5px}
.mrow input[type=text],.mrow select,.mrow textarea{width:100%;border:1px solid var(--border);background:var(--cream);padding:9px 11px;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--char);border-radius:var(--r);outline:none;transition:.2s}
.mrow input:focus,.mrow select:focus,.mrow textarea:focus{border-color:var(--sage)}
.mrow textarea{resize:none;height:60px;font-size:.9rem}
.mfoot{padding:0 28px 24px;display:flex;gap:10px}
.btn-cancel{flex:1;padding:11px;border:1px solid var(--border);background:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--mid);border-radius:var(--r)}
.btn-save{flex:2;padding:11px;background:var(--sage-d);color:var(--cream);border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;border-radius:var(--r);transition:.2s}
.btn-save:hover{background:var(--sage)}
.btn-danger{flex:2;padding:11px;background:#c0392b;color:#fff;border:none;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:1rem;font-style:italic;border-radius:var(--r)}

.joy-row{display:flex;gap:6px}
.jbtn{flex:1;padding:8px 4px;border:1px solid var(--border);background:var(--cream);cursor:pointer;font-family:'DM Mono',monospace;font-size:.57rem;letter-spacing:.08em;text-transform:uppercase;color:var(--mid);border-radius:var(--r);transition:.2s}
.jbtn.ay{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d)}
.jbtn.an{background:var(--blush-l);border-color:var(--blush);color:#8b5a52}

/* Photo zone */
.pzone{border:2px dashed var(--border);border-radius:var(--r);cursor:pointer;transition:.2s;background:var(--cream);position:relative;overflow:hidden}
.pzone:hover{border-color:var(--sage)}
.pzone.drag{border-color:var(--sage-d);background:var(--sage-l)}
.pzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;z-index:2;width:100%;height:100%}
.pzph{padding:18px;text-align:center;pointer-events:none}
.pzph span{display:block;font-size:1.4rem;margin-bottom:4px}
.pzph p{font-family:'DM Mono',monospace;font-size:.57rem;color:var(--light);letter-spacing:.1em;text-transform:uppercase}
.pzprev{display:none;position:relative}
.pzprev img{width:100%;height:130px;object-fit:cover;display:block}
.pzrm{position:absolute;top:6px;right:6px;background:rgba(44,44,44,.75);color:#fff;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:.68rem;display:flex;align-items:center;justify-content:center;z-index:3}

/* Emoji grid */
.egrid{display:flex;flex-wrap:wrap;gap:4px;max-height:120px;overflow-y:auto}
.ep{width:32px;height:32px;border:1px solid transparent;background:none;cursor:pointer;font-size:1.1rem;border-radius:4px;transition:.1s;display:flex;align-items:center;justify-content:center}
.ep:hover{background:var(--cream);border-color:var(--border)}
.ep.sel{background:var(--sage-l);border-color:var(--sage)}

/* Lightbox */
#lb{display:none;position:fixed;inset:0;background:rgba(15,15,15,.93);z-index:600;align-items:center;justify-content:center;flex-direction:column;gap:14px}
#lb.show{display:flex}
#lb img{max-width:90vw;max-height:80vh;object-fit:contain;border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.5)}
#lb p{color:rgba(255,255,255,.6);font-style:italic}
#lbx{position:absolute;top:22px;right:26px;background:none;border:none;color:rgba(255,255,255,.5);font-size:1.6rem;cursor:pointer}
#lbx:hover{color:#fff}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@media(max-width:600px){.screen{padding:24px 16px}.topbar{padding:0 16px}.sections-grid,.cats-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="breadcrumb" id="breadcrumb">
    <span class="bc-item active" onclick="goHome()">🏠 Главная</span>
  </div>
  <div class="topbar-right">
    <div class="stats-pill">
      <div class="sp"><strong id="st-total">0</strong>всего</div>
      <div class="sp"><strong id="st-joy">0</strong>радость</div>
      <div class="sp"><strong id="st-out">0</strong>убрать</div>
    </div>
  </div>
</div>

<!-- SCREEN: HOME -->
<div class="screen active" id="screen-home">
  <div class="home-greeting">
    <h2>Привет! Что <em>разбираем</em> сегодня?</h2>
    <p>Метод КонМари · Оставляй только то, что дарит радость</p>
  </div>
  <div class="sections-grid" id="sections-grid"></div>
</div>

<!-- SCREEN: CATEGORIES -->
<div class="screen" id="screen-cats">
  <div class="cats-header">
    <h2 id="cats-title">Раздел</h2>
    <button class="btn-add-item" onclick="openCatModal()">+ Категория</button>
  </div>
  <div class="cats-grid" id="cats-grid"></div>
</div>

<!-- SCREEN: ITEMS -->
<div class="screen" id="screen-items">
  <div class="items-header">
    <div class="items-header-left">
      <h2 id="items-title">Категория</h2>
      <p id="items-subtitle"></p>
    </div>
    <div class="items-controls">
      <div class="joy-filter">
        <button class="jf-btn active" onclick="setJoyFilter('all')" id="jf-all">Все</button>
        <button class="jf-btn" onclick="setJoyFilter('yes')" id="jf-yes">✨</button>
        <button class="jf-btn" onclick="setJoyFilter('no')" id="jf-no">🗑</button>
        <button class="jf-btn" onclick="setJoyFilter('maybe')" id="jf-maybe">🤔</button>
      </div>
      <button class="sort-btn active" onclick="setSort('newest')" id="sort-newest">Новые</button>
      <button class="sort-btn" onclick="setSort('name')" id="sort-name">А→Я</button>
      <button class="btn-add-item" onclick="openItemModal()">+ Добавить вещь</button>
    </div>
  </div>
  <div class="sub-tabs" id="sub-tabs"></div>
  <div class="items-grid" id="items-grid"></div>
</div>

<!-- ── MODALS ── -->

<!-- Section modal -->
<div class="overlay" id="ov-section">
  <div class="modal" style="max-width:360px">
    <div class="mhead"><h2 id="sm-h">Новый раздел</h2></div>
    <div class="mbody">
      <div class="mrow"><label>Название</label><input type="text" id="sm-name" placeholder="Одежда, Документы..."></div>
      <div class="mrow"><label>Иконка</label><div class="egrid" id="sm-egrid"></div></div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeOv('ov-section')">Отмена</button>
      <button class="btn-save" onclick="saveSection()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Category modal -->
<div class="overlay" id="ov-cat">
  <div class="modal" style="max-width:360px">
    <div class="mhead"><h2 id="cm-h">Новая категория</h2></div>
    <div class="mbody">
      <div class="mrow"><label>Название</label><input type="text" id="cm-name" placeholder="Верхняя одежда, Уход за лицом..."></div>
      <div class="mrow"><label>Иконка</label><div class="egrid" id="cm-egrid"></div></div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeOv('ov-cat')">Отмена</button>
      <button class="btn-save" onclick="saveCat()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Subcategory modal -->
<div class="overlay" id="ov-sub">
  <div class="modal" style="max-width:340px">
    <div class="mhead"><h2 id="sbm-h">Новая подкатегория</h2></div>
    <div class="mbody">
      <div class="mrow"><label>Название</label><input type="text" id="sbm-name" placeholder="Зима, Лето, Повседневное..."></div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeOv('ov-sub')">Отмена</button>
      <button class="btn-save" onclick="saveSub()">Сохранить</button>
    </div>
  </div>
</div>

<!-- Item modal -->
<div class="overlay" id="ov-item">
  <div class="modal">
    <div class="mhead"><h2 id="im-h">Добавить вещь</h2></div>
    <div class="mbody">
      <div class="mrow"><label>Название *</label><input type="text" id="im-name" placeholder="Напр. Белая рубашка H&M"></div>
      <div class="mrow"><label>Подкатегория</label><select id="im-sub"></select></div>
      <div class="mrow">
        <label>Фото</label>
        <div class="pzone" id="pz" ondragover="pzDrag(event,true)" ondragleave="pzDrag(event,false)" ondrop="pzDrop(event)">
          <input type="file" accept="image/*,application/pdf" id="pz-input" onchange="pzSelect(event)">
          <div class="pzph" id="pzph"><span>📷</span><p>Фото или PDF · нажми или перетащи</p></div>
          <div class="pzprev" id="pzprev">
            <img id="pzimg" src="" alt="">
            <div id="pzpdf" style="display:none;padding:16px 12px;align-items:center;gap:10px;background:var(--cream)">
              <span style="font-size:2rem">📄</span>
              <div>
                <div id="pzpdf-name" style="font-size:.9rem;font-weight:600;color:var(--char)"></div>
                <div style="font-family:'DM Mono',monospace;font-size:.55rem;color:var(--light);text-transform:uppercase;letter-spacing:.1em">PDF документ</div>
              </div>
            </div>
            <button class="pzrm" onclick="pzRm(event)">✕</button>
          </div>
        </div>
      </div>
      <div class="mrow"><label>Цвет / Бренд</label><input type="text" id="im-color" placeholder="Напр. Тёмно-синий · Zara"></div>
      <div class="mrow"><label>Заметки</label><textarea id="im-desc" placeholder="Любые заметки..."></textarea></div>
      <div class="mrow">
        <label>Приносит радость?</label>
        <div class="joy-row">
          <button class="jbtn" id="jb-yes" onclick="setJoy('yes')">✨ Да</button>
          <button class="jbtn" id="jb-no" onclick="setJoy('no')">🗑 Нет</button>
          <button class="jbtn" id="jb-maybe" onclick="setJoy('maybe')">🤔 Позже</button>
        </div>
      </div>
    </div>
    <div class="mfoot">
      <button class="btn-cancel" onclick="closeOv('ov-item')">Отмена</button>
      <button class="btn-save" onclick="saveItem()">Добавить</button>
    </div>
  </div>
</div>

<!-- Delete item modal -->
<div class="overlay" id="ov-del">
  <div class="modal" style="max-width:340px">

let D = JSON.parse(localStorage.getItem(SK)||'null') || DEFAULT;
function save(){try{localStorage.setItem(SK,JSON.stringify(D))}catch(e){alert('Мало места — попробуй удалить фото')}}
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let curSection=null, curCat=null, curSub=null; // current drill-down
let joyFilter='all', sortMode='newest';
let curPhoto=null, joyVal=null, delId=null;
let editType=null, editId=null;
let smEmoji='📦', cmEmoji='📦', rnEmoji='📦';

const EMOJIS=['👗','👚','👔','👖','🧥','🧤','🧣','🧶','👠','👟','🥿','👜','💍','🕶','🧢',
  '💄','🧴','🪥','🌸','💅','🧼','🪞','🪮','📄','📋','📁','🗂','📑','📝','🎓','🔑',
  '🏠','🛋','🛁','🪴','🍳','📚','🎮','🎸','🏋️','⚽','🚗','✈️','💎','🌿','🌙','⭐','🔮','🪬','📦','🪪','💳','🏥'];

// ═══════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function goHome(){
  curSection=null; curCat=null; curSub=null;
  joyFilter='all'; sortMode='newest';
  document.querySelectorAll('.jf-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('jf-all').classList.add('active');
  document.getElementById('sort-newest').classList.add('active');
  document.getElementById('sort-name').classList.remove('active');
  renderHome();
  showScreen('home');
  setBreadcrumb([{label:'🏠 Главная',fn:null}]);
}

function openSection(sId){
  curSection=sId; curCat=null; curSub=null;
  const sec=D.sections.find(s=>s.id===sId);
  renderCats();
  showScreen('cats');
  document.getElementById('cats-title').innerHTML=`${sec.icon} <em>${sec.name}</em>`;
  setBreadcrumb([
    {label:'🏠 Главная',fn:goHome},
    {label:sec.name,fn:null}
  ]);
}

function openCat(cId){
  curCat=cId; curSub=null;
  const cat=D.cats.find(c=>c.id===cId);
  const sec=D.sections.find(s=>s.id===cat.sId);
  renderItems();
  showScreen('items');
  document.getElementById('items-title').innerHTML=`${cat.icon} <em>${cat.name}</em>`;
  document.getElementById('items-subtitle').textContent=sec?sec.name:'';
  setBreadcrumb([
    {label:'🏠 Главная',fn:goHome},
    {label:sec?.name||'',fn:()=>openSection(sec.id)},
    {label:cat.name,fn:null}
  ]);
}

function setBreadcrumb(items){
  const bc=document.getElementById('breadcrumb');
  bc.innerHTML=items.map((it,i)=>{
    const isLast=i===items.length-1;
    const cls='bc-item'+(isLast?' active':'');
    const onclick=it.fn?`onclick="(${it.fn.toString()})()"` : '';
    return (i>0?'<span class="bc-sep">›</span>':'')+`<span class="${cls}" ${onclick}>${it.label}</span>`;
  }).join('');
}

// ═══════════════════════════════════════
//  RENDER HOME
// ═══════════════════════════════════════
function updateStats(){
  document.getElementById('st-total').textContent=D.items.length;
  document.getElementById('st-joy').textContent=D.items.filter(i=>i.joy==='yes').length;
  document.getElementById('st-out').textContent=D.items.filter(i=>i.joy==='no').length;
}

function renderHome(){
  updateStats();
  const grid=document.getElementById('sections-grid');
  grid.innerHTML=D.sections.map(sec=>{
    const cats=D.cats.filter(c=>c.sId===sec.id);
    const cnt=D.items.filter(i=>i.sId===sec.id).length;
    const catNames=cats.slice(0,3).map(c=>c.name).join(', ')+(cats.length>3?'…':'');
    return `<div class="section-tile" onclick="openSection('${sec.id}')">
      <div class="tile-actions" onclick="event.stopPropagation()">
        <button class="ta-btn" onclick="openRename('section','${sec.id}')">✏</button>
        <button class="ta-btn" onclick="deleteSection('${sec.id}')">✕</button>
      </div>
      <div class="tile-icon">${sec.icon}</div>
      <div class="tile-name">${sec.name}</div>
      <div class="tile-meta">${cnt} вещей · ${cats.length} категорий</div>
      ${catNames?`<div class="tile-cats">${catNames}</div>`:''}
    </div>`;
  }).join('')+`<div class="add-tile" onclick="openSectionModal()">
    <div class="add-tile-icon">＋</div>
    <div class="add-tile-text">Новый раздел</div>
  </div>`;
}

// ═══════════════════════════════════════
//  RENDER CATEGORIES
// ═══════════════════════════════════════
function renderCats(){
  updateStats();
  const cats=D.cats.filter(c=>c.sId===curSection);
  const grid=document.getElementById('cats-grid');
  grid.innerHTML=cats.map(cat=>{
    const subs=D.subs.filter(s=>s.cId===cat.id);
    const cnt=D.items.filter(i=>i.cId===cat.id).length;
    const subNames=subs.slice(0,3).map(s=>s.name).join(', ')+(subs.length>3?'…':'');
    return `<div class="cat-tile" onclick="openCat('${cat.id}')">
      <div class="ct-actions" onclick="event.stopPropagation()">
        <button class="ta-btn" onclick="openRename('cat','${cat.id}')">✏</button>
        <button class="ta-btn" onclick="deleteCat('${cat.id}')">✕</button>
      </div>
      <div class="ct-icon">${cat.icon}</div>
      <div class="ct-name">${cat.name}</div>
      <div class="ct-meta">${cnt} вещей</div>
      ${subNames?`<div class="ct-subs">${subNames}</div>`:''}
    </div>`;
  }).join('')+`<div class="cat-tile" style="border-style:dashed;justify-content:center;align-items:center;gap:8px;cursor:pointer;min-height:130px" onclick="openCatModal()">
    <div style="font-size:1.6rem;color:var(--light)">＋</div>
    <div style="font-family:'DM Mono',monospace;font-size:.6rem;color:var(--light);letter-spacing:.12em;text-transform:uppercase">Новая категория</div>
  </div>`;
}

// ═══════════════════════════════════════
//  RENDER ITEMS
// ═══════════════════════════════════════
function renderItems(){
  updateStats();
  const cat=D.cats.find(c=>c.id===curCat);
  const subs=D.subs.filter(s=>s.cId===curCat);

  // Sub-tabs
  const tabsEl=document.getElementById('sub-tabs');
  tabsEl.innerHTML=`<button class="sub-tab${curSub===null?' active':''}" onclick="setSub(null)">
      Все <span class="sc">${D.items.filter(i=>i.cId===curCat).length}</span>
    </button>`+
    subs.map(s=>{
      const cnt=D.items.filter(i=>i.subId===s.id).length;
      return `<button class="sub-tab${curSub===s.id?' active':''}" onclick="setSub('${s.id}')">
        ${s.name} <span class="sc">${cnt}</span>
        <span onclick="event.stopPropagation();deleteSub('${s.id}')" style="color:var(--light);margin-left:2px;font-size:.65rem">✕</span>
      </button>`;
    }).join('')+
    `<button class="sub-tab sub-tab-add" onclick="openSubModal()">+ подкатегория</button>`;

  // Items
  let items=D.items.filter(i=>i.cId===curCat);
  if(curSub) items=items.filter(i=>i.subId===curSub);
  if(joyFilter!=='all') items=items.filter(i=>i.joy===joyFilter);
  if(sortMode==='name') items.sort((a,b)=>a.name.localeCompare(b.name,'ru'));
  else if(sortMode==='joy'){const o={yes:0,maybe:1,no:2};items.sort((a,b)=>(o[a.joy]??3)-(o[b.joy]??3));}

  const grid=document.getElementById('items-grid');
  if(!items.length){
    grid.innerHTML=`<div class="empty">
      <span class="ei">🌸</span><p>Здесь пока пусто</p>
      <small>Нажми «+ Добавить вещь» чтобы начать</small>
    </div>`;
    return;
  }
  grid.innerHTML=items.map(item=>{
    const jc=item.joy==='yes'?'j-yes':item.joy==='no'?'j-no':'j-none';
    const jt=item.joy==='yes'?'✨ Радость':item.joy==='no'?'🗑 Убрать':'🤔 Позже';
    const sn=(item.name||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const subName=item.subId?D.subs.find(s=>s.id===item.subId)?.name:'';
    let topEl;
    if(item.fileType==='pdf'&&item.photo){
      topEl=`<div class="card-pdf" onclick="openPDF('${item.id}')">
        <span style="font-size:2.4rem">📄</span>
        <div class="card-pdf-name">${item.fileName||'документ.pdf'}</div>
        <div class="card-pdf-hint">нажми чтобы открыть</div>
      </div>`;
    } else if(item.photo){
      topEl=`<img class="card-photo" src="${item.photo}" alt="${item.name}" onclick="lbOpen('${item.id}')">`;
    } else {
      topEl=`<div class="card-emoji">${cat?.icon||'📦'}</div>`;
    }
    return `<div class="item-card">
      ${topEl}
      <div class="card-body">
        ${subName?`<div class="card-meta">${subName}</div>`:''}
        <div class="card-name">${item.name}</div>
        ${item.color?`<div class="card-meta">${item.color}</div>`:''}
        ${item.desc?`<div class="card-desc">${item.desc}</div>`:''}
        <div class="card-footer">
          <span class="joy-badge ${jc}">${jt}</span>
          <button class="card-del" onclick="askDel('${item.id}','${sn}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setSub(id){curSub=id;renderItems();}
function setJoyFilter(f){joyFilter=f;document.querySelectorAll('.jf-btn').forEach(b=>b.classList.remove('active'));document.getElementById('jf-'+f).classList.add('active');renderItems();}
function setSort(s){sortMode=s;document.querySelectorAll('.sort-btn').forEach(b=>b.classList.remove('active'));document.getElementById('sort-'+s).classList.add('active');renderItems();}

// ═══════════════════════════════════════
//  EMOJI PICKER
// ═══════════════════════════════════════
function renderEgrid(elId, sel, setter){
  document.getElementById(elId).innerHTML=EMOJIS.map(e=>
    `<button class="ep${e===sel?' sel':''}" onclick="${setter}('${e}');renderEgrid('${elId}','${e}',${setter.toString()})">${e}</button>`
  ).join('');
}

// ═══════════════════════════════════════
//  SECTION MODAL
// ═══════════════════════════════════════
function openSectionModal(editSId){
  editType=editSId?'section':null; editId=editSId||null;
  const sec=editSId?D.sections.find(s=>s.id===editSId):null;
  smEmoji=sec?.icon||'📦';
  document.getElementById('sm-h').textContent=editSId?'Изменить раздел':'Новый раздел';
  document.getElementById('sm-name').value=sec?.name||'';
  renderEgrid('sm-egrid',smEmoji,e=>smEmoji=e);
  openOv('ov-section');
  setTimeout(()=>document.getElementById('sm-name').focus(),50);
}
function saveSection(){
  const name=document.getElementById('sm-name').value.trim();
  if(!name)return;
  if(editId){const s=D.sections.find(x=>x.id===editId);if(s){s.name=name;s.icon=smEmoji;}}
  else D.sections.push({id:uid(),name,icon:smEmoji});
  save();closeOv('ov-section');renderHome();
}

// ═══════════════════════════════════════
//  CATEGORY MODAL
// ═══════════════════════════════════════
function openCatModal(editCId){
  editType=editCId?'cat':null; editId=editCId||null;
  const cat=editCId?D.cats.find(c=>c.id===editCId):null;
  cmEmoji=cat?.icon||'📁';
  document.getElementById('cm-h').textContent=editCId?'Изменить категорию':'Новая категория';
  document.getElementById('cm-name').value=cat?.name||'';
  renderEgrid('cm-egrid',cmEmoji,e=>cmEmoji=e);
  openOv('ov-cat');
  setTimeout(()=>document.getElementById('cm-name').focus(),50);
}
function saveCat(){
  const name=document.getElementById('cm-name').value.trim();
  if(!name)return;
  if(editId){const c=D.cats.find(x=>x.id===editId);if(c){c.name=name;c.icon=cmEmoji;}}
  else D.cats.push({id:uid(),sId:curSection,name,icon:cmEmoji});
  save();closeOv('ov-cat');renderCats();
}

// ═══════════════════════════════════════
//  SUBCATEGORY MODAL
// ═══════════════════════════════════════
function openSubModal(){
  document.getElementById('sbm-name').value='';
  openOv('ov-sub');
  setTimeout(()=>document.getElementById('sbm-name').focus(),50);
}
function saveSub(){
  const name=document.getElementById('sbm-name').value.trim();
  if(!name||!curCat)return;
  D.subs.push({id:uid(),cId:curCat,name});
  save();closeOv('ov-sub');renderItems();
}

// ═══════════════════════════════════════
//  ITEM MODAL
// ═══════════════════════════════════════
function openItemModal(){
  joyVal=null; curPhoto=null; curFileType=null; curFileName=null;
  document.getElementById('im-name').value='';
  document.getElementById('im-color').value='';
  document.getElementById('im-desc').value='';
  document.querySelectorAll('.jbtn').forEach(b=>b.className='jbtn');
  document.getElementById('pz-input').value='';
  document.getElementById('pzph').style.display='block';
  document.getElementById('pzprev').style.display='none';
  document.getElementById('pzimg').style.display='none';
  document.getElementById('pzpdf').style.display='none';
  // Populate sub select
  const subs=D.subs.filter(s=>s.cId===curCat);
  document.getElementById('im-sub').innerHTML='<option value="">— без подкатегории —</option>'+
    subs.map(s=>`<option value="${s.id}"${curSub===s.id?' selected':''}>${s.name}</option>`).join('');
  openOv('ov-item');
  setTimeout(()=>document.getElementById('im-name').focus(),50);
}
function setJoy(v){joyVal=v;document.querySelectorAll('.jbtn').forEach(b=>b.className='jbtn');if(v==='yes')document.getElementById('jb-yes').className='jbtn ay';if(v==='no')document.getElementById('jb-no').className='jbtn an';}
function saveItem(){
  const name=document.getElementById('im-name').value.trim();
  if(!name){document.getElementById('im-name').focus();return;}
  const item={
    id:uid(),name,sId:curSection,cId:curCat,
    subId:document.getElementById('im-sub').value||null,
    color:document.getElementById('im-color').value.trim(),
    desc:document.getElementById('im-desc').value.trim(),
    joy:joyVal,photo:curPhoto,fileType:curFileType||null,fileName:curFileName||null,date:new Date().toISOString()
  };
  D.items.unshift(item);
  try{save();}catch(e){item.photo=null;item.fileType=null;D.items[0]=item;save();alert('Файл не сохранён — мало места.');}
  closeOv('ov-item');renderItems();
}

// File upload (photo or PDF)
let curFileType=null, curFileName=null;
function pzDrag(e,on){e.preventDefault();document.getElementById('pz').classList.toggle('drag',on);}
function pzDrop(e){
  e.preventDefault();document.getElementById('pz').classList.remove('drag');
  const f=e.dataTransfer.files[0];
  if(!f)return;
  if(f.type==='application/pdf')loadPDF(f);
  else if(f.type.startsWith('image/'))loadPhoto(f);
}
function pzSelect(e){
  const f=e.target.files[0];if(!f)return;
  if(f.type==='application/pdf')loadPDF(f);
  else if(f.type.startsWith('image/'))loadPhoto(f);
}
function loadPhoto(file){
  curFileType='image'; curFileName=file.name;
  const r=new FileReader();
  r.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const c=document.createElement('canvas'),M=900;
      let w=img.width,h=img.height;
      if(w>M||h>M){if(w>h){h=Math.round(h*M/w);w=M;}else{w=Math.round(w*M/h);h=M;}}
      c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);
      curPhoto=c.toDataURL('image/jpeg',.78);
      document.getElementById('pzph').style.display='none';
      document.getElementById('pzprev').style.display='block';
      document.getElementById('pzimg').style.display='block';
      document.getElementById('pzimg').src=curPhoto;
      document.getElementById('pzpdf').style.display='none';
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function loadPDF(file){
  curFileType='pdf'; curFileName=file.name;
  const r=new FileReader();
  r.onload=function(e){
    curPhoto=e.target.result; // store as base64 data URL
    document.getElementById('pzph').style.display='none';
    document.getElementById('pzprev').style.display='block';
    document.getElementById('pzimg').style.display='none';
    const pdfEl=document.getElementById('pzpdf');
    pdfEl.style.display='flex';
    document.getElementById('pzpdf-name').textContent=file.name;
  };
  r.readAsDataURL(file);
}
function pzRm(e){
  e.stopPropagation();curPhoto=null;curFileType=null;curFileName=null;
  document.getElementById('pz-input').value='';
  document.getElementById('pzph').style.display='block';
  document.getElementById('pzprev').style.display='none';
  document.getElementById('pzimg').style.display='none';
  document.getElementById('pzpdf').style.display='none';
}

// ═══════════════════════════════════════
//  DELETE
// ═══════════════════════════════════════
function askDel(id,name){delId=id;document.getElementById('del-text').textContent=`"${name}" — поблагодарите эту вещь за службу.`;openOv('ov-del');}
function confirmDel(){if(delId){D.items=D.items.filter(i=>i.id!==delId);save();renderItems();}closeOv('ov-del');delId=null;}

function deleteSection(id){
  if(!confirm('Удалить раздел? Все категории и вещи в нём будут удалены.'))return;
  const catIds=D.cats.filter(c=>c.sId===id).map(c=>c.id);
  D.subs=D.subs.filter(s=>!catIds.includes(s.cId));
  D.items=D.items.filter(i=>i.sId!==id);
  D.cats=D.cats.filter(c=>c.sId!==id);
  D.sections=D.sections.filter(s=>s.id!==id);
  save();renderHome();
}
function deleteCat(id){
  if(!confirm('Удалить категорию? Все вещи в ней будут удалены.'))return;
  D.subs=D.subs.filter(s=>s.cId!==id);
  D.items=D.items.filter(i=>i.cId!==id);
  D.cats=D.cats.filter(c=>c.id!==id);
  save();renderCats();
}
function deleteSub(id){
  if(!confirm('Удалить подкатегорию? Вещи останутся в категории без подкатегории.'))return;
  D.items.forEach(i=>{if(i.subId===id)i.subId=null;});
  D.subs=D.subs.filter(s=>s.id!==id);
  if(curSub===id)curSub=null;
  save();renderItems();
}

// ═══════════════════════════════════════
//  RENAME
// ═══════════════════════════════════════
let rnType=null,rnId=null;
function openRename(type,id){
  rnType=type;rnId=id;
  const titles={section:'Изменить раздел',cat:'Изменить категорию'};
  document.getElementById('rn-h').textContent=titles[type]||'Переименовать';
  const wrap=document.getElementById('rn-emoji-wrap');
  if(type==='section'){
    const s=D.sections.find(x=>x.id===id);
    document.getElementById('rn-name').value=s?.name||'';
    rnEmoji=s?.icon||'📦';wrap.style.display='block';
    renderEgrid('rn-egrid',rnEmoji,e=>rnEmoji=e);
  } else if(type==='cat'){
    const c=D.cats.find(x=>x.id===id);
    document.getElementById('rn-name').value=c?.name||'';
    rnEmoji=c?.icon||'📁';wrap.style.display='block';
    renderEgrid('rn-egrid',rnEmoji,e=>rnEmoji=e);
  }
  openOv('ov-rename');
  setTimeout(()=>document.getElementById('rn-name').focus(),50);
}
function confirmRename(){
  const name=document.getElementById('rn-name').value.trim();
  if(!name)return;
  if(rnType==='section'){const s=D.sections.find(x=>x.id===rnId);if(s){s.name=name;s.icon=rnEmoji;}}
  else if(rnType==='cat'){const c=D.cats.find(x=>x.id===rnId);if(c){c.name=name;c.icon=rnEmoji;}}
  save();closeOv('ov-rename');
  if(rnType==='section')renderHome();
  else renderCats();
}

// ═══════════════════════════════════════
//  OVERLAY HELPERS
// ═══════════════════════════════════════
function openOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');}

document.querySelectorAll('.overlay').forEach(o=>{
  o.addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')document.querySelectorAll('.overlay.show').forEach(o=>o.classList.remove('show'));
});

// ═══════════════════════════════════════
//  LIGHTBOX
// ═══════════════════════════════════════
function lbOpen(id){const item=D.items.find(i=>i.id===id);if(!item?.photo||item.fileType==='pdf')return;document.getElementById('lbimg').src=item.photo;document.getElementById('lbcap').textContent=item.name;document.getElementById('lb').classList.add('show');}
function lbClose(){document.getElementById('lb').classList.remove('show');}
function openPDF(id){
  const item=D.items.find(i=>i.id===id);
  if(!item?.photo)return;
  const win=window.open();
  win.document.write(`<html><head><title>${item.name}</title></head><body style="margin:0"><embed src="${item.photo}" type="application/pdf" width="100%" height="100%" style="position:fixed;inset:0"></body></html>`);
}

// ═══════════════════════════════════════
renderHome();
</script>
